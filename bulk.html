<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormExcel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
  <div class="container">
    <label for="input-n-row">Row: </label>
    <input type="number" id="input-n" class="input-size form-control" value="5">
    <label for="input-m-col">Col: </label>
    <input type="number" id="input-m" class="input-size form-control" value="5">

    <input class="form-control" type="file" id="foto" accept="image/*" capture="environment" multiple>

    <button onclick="exportExcel()">Export ke Excel</button>
  </div>
  <script>
    async function exportExcel() {

        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet("Foto");

        const n = Number(document.getElementById("input-n").value);
        const m = Number(document.getElementById("input-m").value);

        for (let c = 1; c <= m; c++)
            sheet.getColumn(c).width = 20;

        for (let r = 1; r <= n; r++)
            sheet.getRow(r).height = 90;

        const files = document.getElementById("foto").files;

        const max = n * m;

        for (let i = 0; i < Math.min(files.length, max); i++) {

            const file = files[i];

            const base64 = await fileToBase64(file);

            const imageId = workbook.addImage({
                base64,
                extension: file.type.includes("png") ? "png" : "jpeg"
            });

            const row = Math.floor(i / m);
            const col = i % m;

            sheet.addImage(imageId, {
                tl: {
                    row,
                    col
                },
                ext: {
                    width: 100,
                    height: 100
                }
            });
        }

        const buffer = await workbook.xlsx.writeBuffer();

        saveAs(
            new Blob([buffer], {
                type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
            }),
            "Foto.xlsx"
        );
    }



    function fileToBase64(file) {

        return new Promise((resolve) => {

            const reader = new FileReader();

            reader.onload = e => resolve(e.target.result);

            reader.readAsDataURL(file);

        });

    }
  </script>

</body>
</html>
