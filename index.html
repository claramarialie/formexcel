<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormExcel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
  <div class="container">
    <label for="input-n-row">Row: </label>
    <input type="number" id="input-n" class="input-size" value="5">
    <label for="input-m-col">Col: </label>
    <input type="number" id="input-m" class="input-size"value="5">
    <table id="table"></table>
    <!-- <input type="file" id="foto" accept="image/*" capture="environment"> -->
    <div id="list"></div>
    <br>
    <img id="preview" style="display:none;">
    <br>
    <button onclick="exportExcel()">Export ke Excel</button>
  </div>
  <script>

    table = document.getElementById("table")
    document.querySelectorAll(".input-size").forEach(inp => {
      inp.addEventListener('input', function() {
        
        n = document.getElementById("input-n").value
        m = document.getElementById("input-m").value
        table.innerHTML = ''
        var str = '';
        for (var i = 0; i < n; i++) {
          str += '<tr>'
          for (var j = 0; j < m; j++) {
            str += `
            <td>
                <input
                    type="file"
                    accept="image/*"
                    capture="environment"
                    class="foto"
                    data-row="${i}"
                    data-col="${j}">
            </td>`;
          }
          str += '</tr>'
        }
        console.log(str)
        table.innerHTML = str
      })
    })

    async function exportExcel() {

        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet("Foto");

        const n = Number(document.getElementById("input-n").value);
        const m = Number(document.getElementById("input-m").value);

        // lebar kolom
        for (let c = 1; c <= m; c++) {
            sheet.getColumn(c).width = 20;
        }

        // tinggi baris
        for (let r = 1; r <= n; r++) {
            sheet.getRow(r).height = 90;
        }

        const inputs = document.querySelectorAll(".foto");

        for (const input of inputs) {

            if (input.files.length == 0)
                continue;

            const file = input.files[0];

            const base64 = await fileToBase64(file);

            const imageId = workbook.addImage({
                base64: base64,
                extension: file.type.includes("png") ? "png" : "jpeg"
            });

            const row = Number(input.dataset.row);
            const col = Number(input.dataset.col);

            sheet.addImage(imageId, {
                tl: {
                    col: col,
                    row: row
                },
                ext: {
                    width: 100,
                    height: 100
                }
            });
        }

        const buffer = await workbook.xlsx.writeBuffer();

        saveAs(
            new Blob([buffer], {
                type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
            }),
            "Foto.xlsx"
        );
    }
    function fileToBase64(file) {

        return new Promise((resolve) => {

            const reader = new FileReader();

            reader.onload = e => resolve(e.target.result);

            reader.readAsDataURL(file);

        });

    }
  </script>

</body>
</html>
