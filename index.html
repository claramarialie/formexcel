<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormExcel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

</head>
<body>

<div class="container">

<h2>Upload Foto → Export Excel</h2>

<input type="file" id="upload" multiple accept="image/*">

<br>

<button onclick="exportExcel()">Export Excel</button>

<div class="grid" id="preview"></div>

</div>

<script>

let images=[];

document.getElementById("upload").addEventListener("change",function(e){

images=[];

const preview=document.getElementById("preview");
preview.innerHTML="";

Array.from(e.target.files).forEach(file=>{

const reader=new FileReader();

reader.onload=function(evt){

images.push({
name:file.name,
base64:evt.target.result
});

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${evt.target.result}">
<small>${file.name}</small>
`;

preview.appendChild(card);

}

reader.readAsDataURL(file);

});

});


async function exportExcel(){

if(images.length==0){
alert("Upload foto terlebih dahulu");
return;
}

const workbook=new ExcelJS.Workbook();

const sheet=workbook.addWorksheet("Foto");

sheet.columns=[
{header:"No",width:10},
{header:"Nama File",width:35},
{header:"Foto",width:25}
];

for(let i=0;i<images.length;i++){

const img=images[i];

const row=sheet.addRow([
i+1,
img.name,
""
]);

row.height=90;

const imageId=workbook.addImage({
base64:img.base64,
extension:img.base64.includes("png")?"png":"jpeg"
});

sheet.addImage(imageId,{
tl:{col:2.2,row:i+1.2},
ext:{width:100,height:100}
});

}

const buffer=await workbook.xlsx.writeBuffer();

saveAs(
new Blob([buffer],{
type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
}),
"Data_Foto.xlsx"
);

}

</script>

</body>
</html>
