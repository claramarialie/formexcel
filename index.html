<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormExcel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="lib/select2-4.1.0/dist/js/select2.min.js"></script>
    <script src="templates.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="lib/select2-4.1.0/dist/css/select2.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .table-responsive {
            overflow: auto;
            /* max-height:75vh; */
            border: 1px solid #dee2e6;
            border-radius: 10px;
        }

        td {
            min-width: 140px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <select class="form-control js-example-placeholder-simple" name="state"></select>
        <label for="input-n-row">Row: </label>
        <input type="number" id="input-n" class="input-size form-control" value="1">
        <label for="input-m-col">Col: </label>
        <input type="number" id="input-m" class="input-size form-control" value="1">
        <div class="table-responsive">
            <table id="table" class="table table-bordered"></table>
        </div>

        <button onclick="exportExcel()" class="btn btn-success">Export ke Excel</button>
    </div>
</body>
</html>
